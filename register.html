<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | Ahmad AOE Trading Academy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a class="brand" href="../index.html">
        <span class="brand-mark"><i class="fa-solid fa-chart-line"></i></span>
        <span>Ahmad AOE</span>
      </a>
      <div class="nav-links">
        <a href="../index.html">Home</a>
        <a href="login.html">Login</a>
      </div>
    </div>
  </nav>

  <main class="form-shell">
    <div class="form-card fade-up">
      <h1>Create Your Account</h1>
      <p>Join the elite circle of disciplined traders.</p>
      <form>
        <div class="row">
          <div class="form-group">
            <label>First Name</label>
            <input type="text" placeholder="First name" />
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <input type="text" placeholder="Last name" />
          </div>
        </div>
        <div class="form-group"><label>Username</label><input type="text" placeholder="traderx" /></div>
        <div class="form-group"><label>Email</label><input type="email" placeholder="you@example.com" /></div>
        <div class="form-group"><label>Phone Number</label><input type="tel" placeholder="+1 555 000" /></div>
        <div class="form-group"><label>Country</label><select><option>United States</option><option>United Kingdom</option><option>UAE</option><option>Canada</option></select></div>
        <div class="row">
          <div class="form-group"><label>Password</label><input type="password" placeholder="••••••••" /></div>
          <div class="form-group"><label>Confirm Password</label><input type="password" placeholder="••••••••" /></div>
        </div>
        <div class="form-group"><label>Referral Code (Optional)</label><input type="text" placeholder="REF123" /></div>
        <label class="checkbox-row" style="margin-bottom:1rem;"><input type="checkbox" /> I accept the terms and privacy policy.</label>
        <a class="btn btn-primary" style="width:100%;" href="dashboard.html">Create Account</a>
      </form>
      <p style="margin-top:1rem; text-align:center;">Already have an account? <a href="login.html">Login</a></p>
    </div>
  </main>

  <script src="../assets/js/main.js"></script>
</body>
</html>
