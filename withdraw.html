<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Withdraw | Ahmad AOE Trading Academy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a class="brand" href="dashboard.html">
        <span class="brand-mark"><i class="fa-solid fa-chart-line"></i></span>
        <span>AHMAD AOE</span>
      </a>
    </div>
  </nav>
  <main class="container" style="padding:2rem 0;">
    <div class="card fade-up">
      <h1>Withdraw Funds</h1>
      <p class="muted">Request a withdrawal with your preferred payment method.</p>
      <div class="row">
        <div class="form-group"><label>Amount</label><input type="number" placeholder="500" /></div>
        <div class="form-group"><label>Payment Method</label><select><option>Bank Account</option><option>USDT</option><option>Bitcoin</option><option>Ethereum</option></select></div>
      </div>
      <div class="form-group"><label>Wallet Address</label><input type="text" placeholder="0x..." /></div>
      <div class="form-group"><label>Bank Account</label><input type="text" placeholder="IBAN / Account" /></div>
      <a class="btn btn-primary" href="wallet.html">Submit Request</a>
    </div>
  </main>
  <script src="../assets/js/main.js"></script>
</body>
</html>
