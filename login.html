<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Ahmad AOE Trading Academy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a class="brand" href="../index.html">
        <span class="brand-mark"><i class="fa-solid fa-chart-line"></i></span>
        <span>Ahmad AOE</span>
      </a>
      <div class="nav-links">
        <a href="../index.html">Home</a>
        <a href="register.html">Register</a>
      </div>
    </div>
  </nav>

  <main class="form-shell">
    <div class="form-card fade-up">
      <h1>Welcome Back</h1>
      <p>Access elite market education and live trading insights.</p>
      <form>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input id="email" type="email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="••••••••" />
        </div>
        <div class="inline-actions">
          <label class="checkbox-row"><input type="checkbox" /> Remember me</label>
          <a href="forgot-password.html">Forgot Password?</a>
        </div>
        <a class="btn btn-primary" style="width:100%; margin-bottom:.8rem;" href="dashboard.html">Login</a>
        <div class="social-grid">
          <a class="social-btn" href="dashboard.html"><i class="fa-brands fa-google"></i> Continue with Google</a>
          <a class="social-btn" href="dashboard.html"><i class="fa-brands fa-github"></i> Continue with GitHub</a>
        </div>
      </form>
      <p style="margin-top:1rem; text-align:center;">Don’t have an account? <a href="register.html">Create one</a></p>
    </div>
  </main>

  <script src="../assets/js/main.js"></script>
</body>
</html>
